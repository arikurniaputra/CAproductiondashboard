<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iN-Touch · Production Dashboard | CA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   Cladtek iN-Touch Production Dashboard
   All selectors are scoped under .ctd- to avoid Staffbase CSS collisions.
   Brand: Montserrat · blue #1C9AD6 · navy #0F2A3F
   ========================================================================== */
.ctd-root{
  --ctd-blue:#1C9AD6;
  --ctd-blue-d:#1580b4;
  --ctd-navy:#0F2A3F;
  --ctd-slate:#5B7183;
  --ctd-track:#E7EEF3;
  --ctd-line:#DCE6EC;
  --ctd-bg:#F4F8FA;
  --ctd-card:#FFFFFF;
  --ctd-good:#2FA96B;
  --ctd-warn:#E39B2E;
  --ctd-bad:#DB5138;
  --ctd-shadow:0 1px 2px rgba(15,42,63,.05), 0 8px 24px rgba(15,42,63,.06);

  font-family:'Montserrat',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ctd-navy);
  background:var(--ctd-bg);
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum" 1;
  box-sizing:border-box;
  padding:24px 20px 40px;
  min-height:100%;
}
.ctd-root *,.ctd-root *::before,.ctd-root *::after{box-sizing:border-box;}
.ctd-wrap{max-width:1180px;margin:0 auto;}

/* ---------- header ---------- */
.ctd-head{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:16px;flex-wrap:wrap;
  padding-bottom:16px;margin-bottom:22px;
  border-bottom:2px solid var(--ctd-line);
  position:relative;
}
.ctd-head::after{content:"";position:absolute;left:0;bottom:-2px;height:2px;width:120px;background:var(--ctd-blue);}
.ctd-brand{display:flex;flex-direction:column;gap:4px;}
.ctd-eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ctd-blue);}
.ctd-title{font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1;}
.ctd-title span{color:var(--ctd-blue);}
.ctd-sub{font-size:12.5px;font-weight:500;color:var(--ctd-slate);margin-top:2px;}
.ctd-status{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.ctd-live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ctd-slate);
  background:var(--ctd-card);border:1px solid var(--ctd-line);border-radius:999px;padding:6px 12px;}
.ctd-dot{width:8px;height:8px;border-radius:50%;background:var(--ctd-good);position:relative;}
.ctd-dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--ctd-good);opacity:.35;animation:ctd-pulse 2s ease-out infinite;}
.ctd-live.is-sample .ctd-dot{background:var(--ctd-warn);}
.ctd-live.is-sample .ctd-dot::after{background:var(--ctd-warn);}
@keyframes ctd-pulse{0%{transform:scale(1);opacity:.35}70%{transform:scale(2.2);opacity:0}100%{opacity:0}}
.ctd-refresh{border:1px solid var(--ctd-line);background:var(--ctd-card);color:var(--ctd-navy);
  font-family:inherit;font-size:12px;font-weight:600;border-radius:999px;padding:6px 14px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:border-color .15s,color .15s;}
.ctd-refresh:hover{border-color:var(--ctd-blue);color:var(--ctd-blue);}
.ctd-refresh:focus-visible{outline:2px solid var(--ctd-blue);outline-offset:2px;}

/* ---------- headline strip ---------- */
.ctd-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;}
.ctd-kpi{background:var(--ctd-card);border:1px solid var(--ctd-line);border-radius:14px;padding:18px 20px;box-shadow:var(--ctd-shadow);position:relative;overflow:hidden;}
.ctd-kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ctd-blue);}
.ctd-kpi-label{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ctd-slate);}
.ctd-kpi-val{font-size:38px;font-weight:800;line-height:1;margin-top:10px;letter-spacing:-.02em;}
.ctd-kpi-val small{font-size:20px;font-weight:700;color:var(--ctd-slate);margin-left:2px;}
.ctd-kpi-note{font-size:11.5px;font-weight:500;color:var(--ctd-slate);margin-top:6px;}

/* ---------- sections ---------- */
.ctd-section{margin-bottom:26px;}
.ctd-sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ctd-sec-num{font-size:11px;font-weight:700;color:var(--ctd-blue);letter-spacing:.1em;}
.ctd-sec-title{font-size:15px;font-weight:800;letter-spacing:.01em;text-transform:uppercase;}
.ctd-sec-rule{flex:1;height:1px;background:var(--ctd-line);}

.ctd-card{background:var(--ctd-card);border:1px solid var(--ctd-line);border-radius:14px;box-shadow:var(--ctd-shadow);}
.ctd-grid{display:grid;gap:14px;}
.ctd-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.ctd-panel{padding:18px 20px;}
.ctd-panel-title{font-size:13px;font-weight:700;color:var(--ctd-navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ctd-panel-title .ctd-count{font-size:11px;font-weight:600;color:var(--ctd-slate);background:var(--ctd-bg);border-radius:999px;padding:2px 8px;}

/* ---------- meter bars ---------- */
.ctd-bar{display:grid;grid-template-columns:96px 1fr 54px;align-items:center;gap:12px;padding:7px 0;}
.ctd-bar-label{font-size:12.5px;font-weight:600;color:var(--ctd-navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctd-bar-track{position:relative;height:12px;border-radius:7px;background:var(--ctd-track);overflow:hidden;}
.ctd-bar-fill{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:7px;background:linear-gradient(90deg,var(--ctd-blue-d),var(--ctd-blue));transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.ctd-bar-fill.low{background:linear-gradient(90deg,#c8792a,var(--ctd-warn));}
.ctd-bar-val{font-size:13px;font-weight:700;text-align:right;color:var(--ctd-navy);}
.ctd-bar-val.low{color:var(--ctd-warn);}
/* baseline ticks on the track — the "instrument" cue */
.ctd-bar-track::after{content:"";position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(90deg,transparent 0,transparent calc(25% - 1px),rgba(15,42,63,.10) 25%,transparent calc(25% + 1px)),
                   linear-gradient(90deg,transparent 0,transparent calc(50% - 1px),rgba(15,42,63,.12) 50%,transparent calc(50% + 1px)),
                   linear-gradient(90deg,transparent 0,transparent calc(75% - 1px),rgba(15,42,63,.10) 75%,transparent calc(75% + 1px));}

/* ---------- donuts (FPY) ---------- */
.ctd-donuts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.ctd-donut{background:var(--ctd-card);border:1px solid var(--ctd-line);border-radius:14px;box-shadow:var(--ctd-shadow);
  padding:18px 12px 16px;text-align:center;}
.ctd-donut-svg{width:118px;height:118px;margin:0 auto;display:block;}
.ctd-donut-ring{fill:none;stroke:var(--ctd-track);stroke-width:11;}
.ctd-donut-val{fill:none;stroke:var(--ctd-blue);stroke-width:11;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1);}
.ctd-donut-val.low{stroke:var(--ctd-warn);}
.ctd-donut-num{font-size:24px;font-weight:800;fill:var(--ctd-navy);}
.ctd-donut-pct{font-size:12px;font-weight:700;fill:var(--ctd-slate);}
.ctd-donut-name{font-size:12.5px;font-weight:700;color:var(--ctd-navy);margin-top:10px;}

/* ---------- plan vs actual (deposition) ---------- */
.ctd-dep-period{font-size:11.5px;font-weight:600;color:var(--ctd-slate);margin-bottom:14px;}
.ctd-dep-legend{display:flex;gap:16px;margin-bottom:16px;font-size:11.5px;font-weight:600;color:var(--ctd-slate);}
.ctd-dep-legend span{display:inline-flex;align-items:center;gap:6px;}
.ctd-swatch{width:11px;height:11px;border-radius:3px;display:inline-block;}
.ctd-sw-plan{background:var(--ctd-navy);}
.ctd-sw-actual{background:var(--ctd-blue);}
.ctd-dep-row{padding:12px 0;border-top:1px solid var(--ctd-line);}
.ctd-dep-row:first-of-type{border-top:0;}
.ctd-dep-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.ctd-dep-name{font-size:12.5px;font-weight:700;color:var(--ctd-navy);}
.ctd-delta{font-size:11.5px;font-weight:700;border-radius:999px;padding:2px 9px;}
.ctd-delta.up{color:var(--ctd-good);background:rgba(47,169,107,.10);}
.ctd-delta.down{color:var(--ctd-bad);background:rgba(219,81,56,.10);}
.ctd-dep-bars{display:flex;flex-direction:column;gap:6px;}
.ctd-dep-line{display:grid;grid-template-columns:52px 1fr auto;align-items:center;gap:10px;}
.ctd-dep-key{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ctd-slate);}
.ctd-dep-track{height:14px;border-radius:5px;background:var(--ctd-track);overflow:hidden;}
.ctd-dep-fill{height:100%;width:0;border-radius:5px;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.ctd-dep-fill.plan{background:var(--ctd-navy);}
.ctd-dep-fill.actual{background:linear-gradient(90deg,var(--ctd-blue-d),var(--ctd-blue));}
.ctd-dep-figs{font-size:12px;font-weight:700;color:var(--ctd-navy);white-space:nowrap;min-width:64px;text-align:right;}

/* ---------- footer ---------- */
.ctd-foot{margin-top:30px;padding-top:14px;border-top:1px solid var(--ctd-line);
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
  font-size:11px;font-weight:500;color:var(--ctd-slate);}
.ctd-foot b{color:var(--ctd-navy);font-weight:700;}

/* ---------- states ---------- */
.ctd-empty{padding:16px 20px;font-size:12.5px;color:var(--ctd-slate);}
.ctd-banner{display:none;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#8a5a12;
  background:#FDF3E1;border:1px solid #F3D9A8;border-radius:10px;padding:10px 14px;margin-bottom:20px;}
.ctd-banner.show{display:flex;}

/* ---------- responsive ---------- */
@media (max-width:820px){
  .ctd-kpis{grid-template-columns:1fr;}
  .ctd-grid.cols-2{grid-template-columns:1fr;}
  .ctd-title{font-size:22px;}
  .ctd-kpi-val{font-size:32px;}
}
@media (prefers-reduced-motion:reduce){
  .ctd-bar-fill,.ctd-donut-val,.ctd-dep-fill{transition:none !important;}
  .ctd-dot::after{animation:none;}
}
</style>
</head>
<body>
<div class="ctd-root">
  <div class="ctd-wrap">

    <header class="ctd-head">
      <div class="ctd-brand">
        <div class="ctd-eyebrow">iN-Touch · Production</div>
        <div class="ctd-title">Production <span>Dashboard</span></div>
        <div class="ctd-sub">Cladtek · CA Facility — live performance overview</div>
      </div>
      <div class="ctd-status">
        <span class="ctd-live" id="ctdLive"><span class="ctd-dot"></span><span id="ctdLiveText">Loading…</span></span>
        <button class="ctd-refresh" id="ctdRefresh" type="button" aria-label="Refresh data">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <div class="ctd-banner" id="ctdBanner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16.5v.01"/></svg>
      <span id="ctdBannerText">Showing sample data. Add your published Sheet URL in the config to go live.</span>
    </div>

    <div class="ctd-kpis" id="ctdKpis"></div>

    <main id="ctdBody"></main>

    <footer class="ctd-foot">
      <span>Cladtek Holdings · CRA Pipeline Manufacturing</span>
      <span id="ctdUpdated">—</span>
    </footer>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* =========================================================================
     CONFIG — the only part you normally touch.
     1) In your Google Sheet: File → Share → Publish to web → choose the data
        tab → CSV. Paste that CSV link below (it ends with output=csv).
     2) Leave it "" to preview with the built-in sample data.
     ========================================================================= */
  var CONFIG = {
    csvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRCTe6d26mDOozZCkx6GnHpfsH81IJgeOE-xz0jA-Z-dQHAhgxBBaM7VcprNdYz5Q/pub?gid=984896739&single=true&output=csv",
    refreshMinutes: 1,      // auto-refresh interval (0 = off)
    lowThreshold: 50         // % below this is flagged amber on bars & donuts
  };

  /* =========================================================================
     Panel layout & order. Titles come from the sheet's "Type" values.
     To reorder / rename a section, edit this list.
     ========================================================================= */
  var PANELS = [
    { type:"OEE", title:"OEE", chart:"bars",  label:"process",   full:true },
    { type:"First Pass Yield",    title:"First Pass Yield",    chart:"donuts", label:"process",   full:true },
    { type:"WOL Pipe",            title:"WOL Pipe",            chart:"bars",   label:"projectId" },
    { type:"Flanges & Fitting",   title:"WOL Flanges",         chart:"bars",   label:"projectId", process:"WOL Flanges" },
    { type:"Flanges & Fitting",   title:"WOL Fittings",        chart:"bars",   label:"projectId", process:"WOL Fittings" },
    { type:"Spooling",            title:"Spooling",            chart:"bars",   label:"projectId" },
    { type:"Deposition",          title:"Deposition — This Week", chart:"plan", scope:"weekly",     full:true },
    { type:"Deposition",          title:"Deposition — Cumulative", chart:"plan", scope:"cumulative", full:true }
  ];

  /* Built-in sample data (mirrors the current dashboard) --------------------- */
  var SAMPLE = [
    ["Type","Process","Start Week","End Week","Project ID","Value","Remark"],
    ["OEE","CNC","","","","0.83",""],
    ["OEE","SHV","","","","0.78",""],
    ["OEE","QH","","","","0.78",""],
    ["OEE","TOTAL OEE","","","","0.80",""],
    ["First Pass Yield","PT. Solvents","","","","0.98",""],
    ["First Pass Yield","PT. WW","","","","1.00",""],
    ["First Pass Yield","FDI","","","","1.00",""],
    ["First Pass Yield","RT","","","","0.93",""],
    ["WOL Pipe","","","","CA116","1",""],
    ["WOL Pipe","","","","CA135","0.96",""],
    ["Flanges & Fitting","WOL Flanges","","","CA123","0.93",""],
    ["Flanges & Fitting","WOL Flanges","","","CA124","0.93",""],
    ["Flanges & Fitting","WOL Flanges","","","CA098","0.84",""],
    ["Flanges & Fitting","WOL Flanges","","","CA143","0.83",""],
    ["Flanges & Fitting","WOL Fittings","","","CA111","0.99",""],
    ["Spooling","","","","CA132","1",""],
    ["Spooling","","","","CA133","0.9",""],
    ["Spooling","","","","CA141","0.26",""],
    ["Deposition","SHV","28/06/2026","04/07/2026","","2004","Plan"],
    ["Deposition","SHV","28/06/2026","04/07/2026","","2310","Actual"],
    ["Deposition","QH & TH","28/06/2026","04/07/2026","","711","Plan"],
    ["Deposition","QH & TH","28/06/2026","04/07/2026","","744","Actual"],
    ["Deposition","QH & TH","Cummulative","","","88295","Plan"],
    ["Deposition","QH & TH","Cummulative","","","96276","Actual"],
    ["Deposition","SHV","Cummulative","","","53107","Plan"],
    ["Deposition","SHV","Cummulative","","","56702","Actual"],
    ["Deposition","SHV, QH, TH","Cummulative","","","141402","Plan"],
    ["Deposition","SHV, QH, TH","Cummulative","","","152978","Actual"]
  ];

  /* ---- helpers ------------------------------------------------------------ */
  function parseCSV(text){
    var rows=[],field="",row=[],inQ=false;
    for(var i=0;i<text.length;i++){
      var c=text[i];
      if(inQ){
        if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else {inQ=false;} }
        else field+=c;
      }else{
        if(c==='"') inQ=true;
        else if(c===','){ row.push(field); field=""; }
        else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=""; }
        else if(c==='\r'){ /* skip */ }
        else field+=c;
      }
    }
    if(field.length||row.length){ row.push(field); rows.push(row); }
    return rows.filter(function(r){return r.some(function(x){return String(x).trim()!=="";});});
  }
  function num(v){
    if(v==null) return NaN;
    var s=String(v).replace(/[%,]/g,"").trim();
    if(s==="") return NaN;
    return parseFloat(s);
  }
  function toPct(v){ return v<=1 ? v*100 : v; }
  function fmtInt(n){ return Math.round(n).toLocaleString("en-US"); }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function isCumul(s){ return /cum+ul/i.test(s||""); } // tolerant of "Cumulative" & the sheet's "Cummulative"

  function normalize(rows){
    // find the real header row (sheets often have a title/instruction row above it)
    var headerRowIndex=-1, headers=[];
    for(var hi=0; hi<Math.min(rows.length,10); hi++){
      var candidate=rows[hi].map(function(h){return String(h).trim().toLowerCase();});
      if(candidate.indexOf("type")>-1 && candidate.indexOf("value")>-1){ headerRowIndex=hi; headers=candidate; break; }
    }
    if(headerRowIndex===-1){ headerRowIndex=0; headers=rows[0].map(function(h){return String(h).trim().toLowerCase();}); }
    function idx(n){return headers.indexOf(n);}
    var iType=idx("type"),iProc=idx("process"),iSW=idx("start week"),
        iEW=idx("end week"),iPID=idx("project id"),iVal=idx("value"),iRem=idx("remark");
    return rows.slice(headerRowIndex+1).map(function(r){
      return {
        type:(r[iType]||"").trim(),
        process:(r[iProc]||"").trim(),
        startWeek:(r[iSW]||"").trim(),
        endWeek:(r[iEW]||"").trim(),
        projectId:(r[iPID]||"").trim(),
        value:num(r[iVal]),
        remark:(r[iRem]||"").trim()
      };
    }).filter(function(x){return x.type;});
  }

  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function fmtDate(s){
    var m=/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/.exec(String(s).trim());
    if(!m) return s;
    var d=parseInt(m[1],10), mo=parseInt(m[2],10);
    return d+" "+(MONTHS[mo-1]||"");
  }
  function periodLabel(rows){
    var w=rows.find(function(r){return r.startWeek && !isCumul(r.startWeek);});
    if(!w) return "";
    var y=/(\d{4})$/.exec(w.endWeek||w.startWeek);
    return "Period: "+fmtDate(w.startWeek)+" – "+fmtDate(w.endWeek)+(y?" "+y[1]:"");
  }

  /* ---- renderers ---------------------------------------------------------- */
  function barsHTML(rows,labelKey){
    rows=rows.slice().sort(function(a,b){return toPct(b.value)-toPct(a.value);});
    return rows.map(function(r){
      var p=toPct(r.value), low=p<CONFIG.lowThreshold;
      return '<div class="ctd-bar">'+
        '<div class="ctd-bar-label" title="'+esc(r[labelKey])+'">'+esc(r[labelKey]||"—")+'</div>'+
        '<div class="ctd-bar-track"><div class="ctd-bar-fill'+(low?" low":"")+'" data-w="'+Math.min(p,100)+'"></div></div>'+
        '<div class="ctd-bar-val'+(low?" low":"")+'">'+Math.round(p)+'%</div>'+
      '</div>';
    }).join("");
  }

  function donutsHTML(rows){
    var R=48, C=2*Math.PI*R;
    return '<div class="ctd-donuts">'+rows.map(function(r){
      var p=Math.min(toPct(r.value),100), low=p<CONFIG.lowThreshold;
      var off=C*(1-p/100);
      return '<div class="ctd-donut">'+
        '<svg class="ctd-donut-svg" viewBox="0 0 120 120" role="img" aria-label="'+esc(r.process)+' '+Math.round(p)+' percent">'+
          '<circle class="ctd-donut-ring" cx="60" cy="60" r="'+R+'"></circle>'+
          '<circle class="ctd-donut-val'+(low?" low":"")+'" cx="60" cy="60" r="'+R+'" '+
            'stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+C.toFixed(1)+'" data-off="'+off.toFixed(1)+'"></circle>'+
          '<text class="ctd-donut-num" x="60" y="60" text-anchor="middle">'+Math.round(p)+'</text>'+
          '<text class="ctd-donut-pct" x="60" y="76" text-anchor="middle">%</text>'+
        '</svg>'+
        '<div class="ctd-donut-name">'+esc(r.process||"—")+'</div>'+
      '</div>';
    }).join("")+'</div>';
  }

  function planHTML(rows){
    // group by process; each group has Plan + Actual
    var order=[], groups={};
    rows.forEach(function(r){
      if(!groups[r.process]){ groups[r.process]={}; order.push(r.process); }
      groups[r.process][r.remark.toLowerCase()]=r.value;
    });
    // combined totals (name has a comma) render last
    order.sort(function(a,b){ return (a.indexOf(",")>-1?1:0)-(b.indexOf(",")>-1?1:0); });
    var max=0;
    order.forEach(function(g){ max=Math.max(max, groups[g].plan||0, groups[g].actual||0); });
    if(max<=0) max=1;

    var period=periodLabel(rows);
    var html="";
    if(period) html+='<div class="ctd-dep-period">'+esc(period)+'</div>';
    html+='<div class="ctd-dep-legend"><span><i class="ctd-swatch ctd-sw-plan"></i>Plan</span><span><i class="ctd-swatch ctd-sw-actual"></i>Actual</span></div>';

    html+=order.map(function(g){
      var pl=groups[g].plan||0, ac=groups[g].actual||0;
      var delta = pl>0 ? ((ac-pl)/pl*100) : 0;
      var up = ac>=pl;
      var dChip = pl>0 ? '<span class="ctd-delta '+(up?"up":"down")+'">'+(up?"▲":"▼")+" "+Math.abs(delta).toFixed(1)+'%</span>' : "";
      return '<div class="ctd-dep-row">'+
        '<div class="ctd-dep-top"><span class="ctd-dep-name">'+esc(g||"—")+'</span>'+dChip+'</div>'+
        '<div class="ctd-dep-bars">'+
          '<div class="ctd-dep-line"><span class="ctd-dep-key">Plan</span>'+
            '<div class="ctd-dep-track"><div class="ctd-dep-fill plan" data-w="'+(pl/max*100)+'"></div></div>'+
            '<span class="ctd-dep-figs">'+fmtInt(pl)+'</span></div>'+
          '<div class="ctd-dep-line"><span class="ctd-dep-key">Actual</span>'+
            '<div class="ctd-dep-track"><div class="ctd-dep-fill actual" data-w="'+(ac/max*100)+'"></div></div>'+
            '<span class="ctd-dep-figs">'+fmtInt(ac)+'</span></div>'+
        '</div>'+
      '</div>';
    }).join("");
    return html;
  }

  /* ---- headline KPIs ------------------------------------------------------ */
  function kpisHTML(data){
    function avg(rows){ if(!rows.length) return null; return rows.reduce(function(s,r){return s+toPct(r.value);},0)/rows.length; }
    var mu=avg(data.filter(function(r){return r.type==="OEE";}));
    var fpy=avg(data.filter(function(r){return r.type==="First Pass Yield";}));
    // cumulative total = combined (comma) group, else sum of all cumulative
    var cum=data.filter(function(r){return r.type==="Deposition" && isCumul(r.startWeek);});
    var combo=cum.filter(function(r){return r.process.indexOf(",")>-1;});
    var src=combo.length?combo:cum;
    var plan=0,act=0;
    src.forEach(function(r){ if(/plan/i.test(r.remark)) plan+=r.value; if(/actual/i.test(r.remark)) act+=r.value; });
    var att = plan>0 ? (act/plan*100) : null;

    var cards=[
      {label:"Avg. OEE", val:mu, note:"Across all machine lines"},
      {label:"Avg. First Pass Yield",    val:fpy, note:"Quality — first-pass right"},
      {label:"Deposition vs Plan",        val:att, note:"Cumulative attainment"}
    ];
    return cards.map(function(c){
      var v = c.val==null ? "—" : Math.round(c.val)+'<small>%</small>';
      return '<div class="ctd-kpi"><div class="ctd-kpi-label">'+esc(c.label)+'</div>'+
             '<div class="ctd-kpi-val">'+v+'</div>'+
             '<div class="ctd-kpi-note">'+esc(c.note)+'</div></div>';
    }).join("");
  }

  /* ---- panel → card ------------------------------------------------------- */
  function panelCard(p, data){
    var rows=data.filter(function(r){ return r.type===p.type; });
    if(p.process) rows=rows.filter(function(r){ return r.process===p.process; });

    var inner="";
    if(p.chart==="bars"){
      if(!rows.length) return null;
      inner='<div class="ctd-panel-title">'+esc(p.title)+' <span class="ctd-count">'+rows.length+'</span></div>'+barsHTML(rows,p.label);
    }else if(p.chart==="donuts"){
      if(!rows.length) return null;
      inner='<div class="ctd-panel-title">'+esc(p.title)+' <span class="ctd-count">'+rows.length+'</span></div>'+donutsHTML(rows);
    }else if(p.chart==="plan"){
      rows=rows.filter(function(r){ return p.scope==="cumulative" ? isCumul(r.startWeek) : !isCumul(r.startWeek); });
      if(!rows.length) return null;
      inner='<div class="ctd-panel-title">'+esc(p.title)+'</div>'+planHTML(rows);
    }
    return '<div class="ctd-card ctd-panel">'+inner+'</div>';
  }

  /* ---- render whole board ------------------------------------------------- */
  function render(data){
    document.getElementById("ctdKpis").innerHTML=kpisHTML(data);

    // group consecutive non-full panels into 2-col rows
    var body=document.getElementById("ctdBody");
    body.innerHTML="";
    var n=0, buffer=[];
    function flushBuffer(){
      if(!buffer.length) return;
      var grid=document.createElement("div");
      grid.className="ctd-grid cols-2";
      grid.style.marginBottom="26px";
      grid.innerHTML=buffer.join("");
      body.appendChild(grid);
      buffer=[];
    }
    PANELS.forEach(function(p){
      var card=panelCard(p,data);
      if(!card) return;
      n++;
      var num2=("0"+n).slice(-2);
      var head='<div class="ctd-sec-head"><span class="ctd-sec-num">'+num2+'</span>'+
               '<span class="ctd-sec-title">'+esc(p.title)+'</span><span class="ctd-sec-rule"></span></div>';
      if(p.full){
        flushBuffer();
        var sec=document.createElement("section");
        sec.className="ctd-section";
        sec.innerHTML=head+card;
        body.appendChild(sec);
      }else{
        // wrap small panels with their own header inside the grid cell
        buffer.push('<section class="ctd-section" style="margin:0">'+head+card+'</section>');
      }
    });
    flushBuffer();

    // animate fills after paint
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      document.querySelectorAll(".ctd-bar-fill,.ctd-dep-fill").forEach(function(el){ el.style.width=el.getAttribute("data-w")+"%"; });
      document.querySelectorAll(".ctd-donut-val").forEach(function(el){ el.setAttribute("stroke-dashoffset", el.getAttribute("data-off")); });
    }); });
  }

  /* ---- status / loading --------------------------------------------------- */
  function setStatus(live, when){
    var el=document.getElementById("ctdLive"), t=document.getElementById("ctdLiveText");
    var banner=document.getElementById("ctdBanner");
    var timeStr=when.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    if(live){ el.classList.remove("is-sample"); t.textContent="Live · updated "+timeStr; banner.classList.remove("show"); }
    else{ el.classList.add("is-sample"); t.textContent="Sample data"; banner.classList.add("show"); }
    document.getElementById("ctdUpdated").innerHTML="Last updated <b>"+when.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})+"</b>";
  }

  function boot(rows, live){
    try{ render(normalize(rows)); setStatus(live, new Date()); }
    catch(e){ console.error(e); document.getElementById("ctdBody").innerHTML='<div class="ctd-empty">Could not render data. Check the sheet columns match: Type, Process, Start Week, End Week, Project ID, Value, Remark.</div>'; }
  }

  function load(){
    if(!CONFIG.csvUrl){ boot(SAMPLE,false); return; }
    var url=CONFIG.csvUrl+(CONFIG.csvUrl.indexOf("?")>-1?"&":"?")+"_t="+Date.now();
    fetch(url,{cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
      .then(function(txt){ var rows=parseCSV(txt); if(rows.length<2) throw new Error("empty"); boot(rows,true); })
      .catch(function(e){ console.warn("CSV load failed, using sample:",e); boot(SAMPLE,false); });
  }

  document.getElementById("ctdRefresh").addEventListener("click",load);
  load();
  if(CONFIG.refreshMinutes>0) setInterval(load, CONFIG.refreshMinutes*60*1000);
})();
</script>
</body>
</html>
